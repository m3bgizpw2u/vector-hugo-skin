baseURL = "https://vector-hugo-skin-example.pages.dev/"
title = "Vector Hugo Skin — Example Site"
defaultContentLanguage = "en"

# Workspace-as-theme per docs/ARCHITECTURE.md §3:
# The theme lives at the parent directory (the workspace root). Hugo's CLI
# resolves it via `themesDir = "../.."` + `theme = "vector-hugo-skin"` — this
# is the safest syntax across Hugo versions that don't honour `theme = ""` for
# direct-parent lookup (Phase 6 verified this on v0.163.3). The npm scripts in
# package.json pass these flags explicitly so the workspace-as-theme layout
# resolves identically from both the `hugo.toml` and a bare `hugo` invocation.

theme = "vector-hugo-skin"
themesDir = "../.."

# Taxonomies — categories and tags, both enabled with the default plural
# term paths so `layouts/_default/categories.html` and
# `layouts/_default/tags.html` can render listing pages. The sidebar
# menus below consume `.Site.Taxonomies.categories` and `.Site.Taxonomies.tags`.
[taxonomies]
  category = "categories"
  tag = "tags"

# Main menu consumed by `partials/sidebar/main-menu.html` (Phase 7). The site
# author customises this block in their own `hugo.toml`; the two entries here
# are the minimum Phase 9 needs for Playwright selectors (Phase 10) to find a
# Home link and an Articles index link.
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Articles"
  url = "/articles/"
  weight = 2

# Dedicated pages that list every term of the category / tag taxonomies.
# The taxonomy term pages (e.g. /tags/demo/, /categories/infobox-demos/)
# are generated by Hugo and reuse `layouts/_default/list.html`, so each
# click into a term lands on the matching article listing.
[[menu.main]]
  name = "Categories"
  url = "/categories/"
  weight = 3

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 4

# Footer nav consumed by `partials/footer/site-footer.html`. Four entries
# mirror Vector 2022's Footer.mustache shape (terms / privacy / about /
# disclaimer). Downstream sites can replace this block with their own.
[[menu.footer]]
  name = "About"
  url = "/about/"
  weight = 1

[[menu.footer]]
  name = "Privacy"
  url = "/privacy/"
  weight = 2

[[menu.footer]]
  name = "Terms"
  url = "/terms/"
  weight = 3

[[menu.footer]]
  name = "Code of conduct"
  url = "/code-of-conduct/"
  weight = 4

# Multilingual config: Hugo v0.158.0 deprecated the top-level `languageCode`
# key in favour of an explicit `[languages.<code>]` table with a `locale`
# field. Setting `weight = 1` keeps this the default language.
[languages]
  [languages.en]
    locale = "en-US"
    weight = 1

# License text consumed by `partials/footer/site-footer.html` (Phase 7).
# Phase 14 boundary: demo content is original prose, never Wikipedia verbatim —
# this string is also original.
[params]
  description = "Example site used to test the vector-hugo-skin theme."
  licenseText = "Content available under a permissive license; see repository for details."

# Build-time JSON search index, Phase 6 (`docs/ARCHITECTURE.md` §5).
# The home page additionally emits `index.json` (a flat array of every regular
# page's {title, summary, url}) for `assets/js/modules/search.ts` to fetch and
# filter client-side. Phase 9 widens the output set to section and page outputs
# so future search/feed work can index subsections too.
[outputs]
  home = ["HTML", "JSON"]
  page = ["HTML", "JSON"]
  section = ["HTML", "JSON"]

# Hugo defaults for [markup.goldmark] etc. are fine — Phase 6 verified that
# `goldmark` is the default renderer in Hugo 0.163.3.
#
# Disable Goldmark's footnote auto-renderer so that `[^key]:` definitions
# in the article body do not produce a duplicate `<section class="footnotes">`
# block alongside the Wikipedia-style footer emitted by the
# `{{< references >}}` shortcode. The shortcode parses the same
# `[^key]: text` definitions from `.RawContent` and renders the custom
# markup itself. Available since Hugo v0.151.0.
[markup.goldmark.extensions.footnote]
enable = false
