{{/*
  Decorative leaf icon — pinnate silhouette (leaflets arranged in pairs
  along a central stem, feather-like). Inline SVG so it inherits the
  row-table text color and scales with font-size. Pure geometry, no
  Wikimedia-derived paths.

  Per docs/PORT-MAP-CONVENTIONS.md §A: this file is original work, not a
  derivative of any upstream MediaWiki asset, so no GPL header.
*/}}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Pinnate leaf">
  <title>Pinnate leaf</title>
  <line x1="12" y1="3" x2="12" y2="22" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" />
  <g fill="currentColor">
    <ellipse cx="12" cy="5" rx="1.6" ry="2.4" />
    <ellipse cx="8.5" cy="7.5" rx="2" ry="1.4" transform="rotate(-30 8.5 7.5)" />
    <ellipse cx="15.5" cy="7.5" rx="2" ry="1.4" transform="rotate(30 15.5 7.5)" />
    <ellipse cx="8" cy="10.5" rx="2.4" ry="1.5" transform="rotate(-30 8 10.5)" />
    <ellipse cx="16" cy="10.5" rx="2.4" ry="1.5" transform="rotate(30 16 10.5)" />
    <ellipse cx="7.5" cy="13.5" rx="2.6" ry="1.6" transform="rotate(-30 7.5 13.5)" />
    <ellipse cx="16.5" cy="13.5" rx="2.6" ry="1.6" transform="rotate(30 16.5 13.5)" />
    <ellipse cx="7.5" cy="16.5" rx="2.4" ry="1.5" transform="rotate(-30 7.5 16.5)" />
    <ellipse cx="16.5" cy="16.5" rx="2.4" ry="1.5" transform="rotate(30 16.5 16.5)" />
    <ellipse cx="8.5" cy="19" rx="2" ry="1.4" transform="rotate(-30 8.5 19)" />
    <ellipse cx="15.5" cy="19" rx="2" ry="1.4" transform="rotate(30 15.5 19)" />
  </g>
</svg>
