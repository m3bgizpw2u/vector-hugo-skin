{{/*
  Original work — reimplementation of Wikipedia's infobox family as a
  Hugo shortcode. GPL-2.0-or-later.
  License header per docs/PORT-MAP-CONVENTIONS.md §A.

  Single-image block partial for the v2 infobox family. Renders the
  `<figure class="infobox-image-block">` wrapper around the `<img>`,
  marks it `data-lightbox` so the rewritten lightbox module picks it up,
  attaches a group key for carousel navigation, and sets the upright
  scaling factor on the figure.

  Dict keys:
    .src       string  — image URL or page-resource path (required for the <img>)
    .alt       string  — alt text (always set, may be empty for decorative)
    .caption   string  — caption under the image (paired-form .Inner already
                          rendered HTML in `.caption`)
    .group     string  — lightbox group key, default "default"
    .upright   float   — upright scaling factor, default 1.0
    .lazy      bool    — when true (default), adds loading="lazy"
    .context   Page    — Hugo page context for resource acquisition

  This version emits a plain `<img>` to keep the v2 skeleton buildable
  even before the full Hugo resource pipeline lands in Phase 3-2. The
  advanced `<picture>` + WebP srcset implementation is layered on top by
  Phase 3-2's ticket.
*/}}
{{ $src     := .src     | default "" }}
{{ $alt     := .alt     | default "" }}
{{ $caption := .caption | default "" }}
{{ $group   := .group   | default "default" }}
{{ $upright := .upright | default 1.0 }}
{{ $lazy    := .lazy    | default true }}

<figure class="infobox-image-block"
        data-lightbox
        {{ if ne $group "" }}data-lightbox-group="{{ $group }}"{{ end }}
        data-upright="{{ $upright }}">
  <img class="infobox-image"
       src="{{ $src }}"
       alt="{{ $alt }}"
       {{ if $lazy }}loading="lazy"{{ else }}loading="eager" fetchpriority="high"{{ end }}
       decoding="async">
  {{ if ne $caption "" }}
    <figcaption class="infobox-caption">{{ $caption | markdownify }}</figcaption>
  {{ end }}
</figure>
