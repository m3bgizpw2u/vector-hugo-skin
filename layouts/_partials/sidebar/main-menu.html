{{/*
  Main menu navigation — populated from hugo.toml's [[menu.main]] entries so
  downstream site authors can customise nav without editing templates. Active
  page gets the .is-active class for sidebar.scss / sticky-header.scss to key
  off.
*/}}
<nav class="main-menu">
  {{ range .Site.Menus.main }}
  <a href="{{ .URL }}" class="main-menu-item{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} is-active{{ end }}">{{ .Name }}</a>
  {{ end }}
</nav>
