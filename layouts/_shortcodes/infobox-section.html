{{- define "infobox/section" -}}
{{- $title := .Get "title" | default "" -}}
{{- if and (eq $title "") .Inner -}}
  {{- $title = strings.TrimSpace .Inner -}}
{{- end -}}
{{- $class := .Get "class" | default "" -}}
<div class="infobox-section-header{{ with $class }} {{ . }}{{ end }}">{{ $title }}</div>
{{- end -}}
{{ template "infobox/section" . }}
