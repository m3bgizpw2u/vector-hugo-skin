  - key: seats_before2
    label: Seats before 2
    type: number
  - key: popular_vote2
    label: Popular vote 2
    type: text
  - key: percentage2
    label: Percentage 2
    type: text
  - key: swing2
    label: Swing 2
    type: text
  - key: below
